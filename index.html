<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Quiz 90+</title>
  
  <!-- أيقونة التبويب باستخدام الرابط المباشر للوجو الشفاف الفخم الخاص بك -->
  <link rel="icon" type="image/png" href="https://i.postimg.cc/8znZnvjn/Gemini-Generated-Image-l9naq5l9naq5l9na-removebg-preview-Cropped-removebg-preview.png">
  
  <!-- ملف التنسيق والألوان الأصلي للموقع -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow"></div>

  <div class="app">
    <header class="top">
      <div>
        <div class="brand">FOOTBALL QUIZ 90+</div>
        <div class="subtitle">اختبر معلوماتك الكروية بشكل فخم</div>
      </div>
    </header>

    <div class="layout">
      <section class="main-col">
        <div id="hearts" class="hearts"></div>

        <section id="startScreen" class="start card">
          <h1>لعبة أسئلة كرة قدم</h1>
          <p id="gameInfo">...</p>
          <button class="primary" onclick="startGame()">ابدأ اللعب</button>
        </section>

        <section id="gameScreen" class="hide">
          <div class="stats">
            <div class="stat">النقاط <b id="score">0</b></div>
            <div class="stat">الأسئلة <b id="qcount">1 / 0</b></div>
            <div class="stat">المستوى <b id="level">0</b></div>
            <div class="stat">الإجابات الصحيحة <b id="correctCount">0</b></div>
          </div>

          <div class="card quiz-card">
            <div class="progress-row">
              <span id="qmeta">السؤال 1</span>
              <span id="livesText">5 محاولات</span>
              <span id="timerText">10</span>
            </div>

            <div class="progress">
              <div class="bar" id="bar"></div>
            </div>

            <h2 id="question">...</h2>
            <div class="options" id="options"></div>

            <div class="actions">
              <button class="secondary" onclick="use50()">حذف 50%</button>
              <button class="secondary" onclick="skipQuestion()">تخطي</button>
              <button class="secondary" onclick="shuffleOptions()">خلط</button>
            </div>
          </div>
        </section>
      </section>

      <aside class="leaderboard card">
        <h3>Top 5</h3>
        <div id="top5"></div>
      </aside>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal card">
      <h2 id="resultTitle">انتهت الجولة</h2>
      <div class="final-score" id="finalScore">0</div>
      <p id="resultMsg"></p>
      <button class="primary" onclick="restartGame()">إعادة اللعب</button>
    </div>
  </div>

  <div class="overlay" id="rewardOverlay">
    <div class="modal card reward">
      <h2>مبروك!</h2>
      <div class="final-score">🎁</div>
      <p>أنت وصلت 50 أو أكثر، وهذه جائزتك الخاصة.</p>
      <button class="primary" onclick="restartGame()">العب مرة أخرى</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
